<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>달력 · Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #fafaf9;
    --surface: #ffffff;
    --ink: #0a0a0a;
    --ink-2: #404040;
    --ink-3: #737373;
    --ink-4: #a3a3a3;
    --line: #e7e5e4;
    --line-2: #f0efed;
    --hover: #f5f5f4;
    --accent: oklch(0.55 0.18 255);
    --accent-fg: #ffffff;
    --accent-soft: oklch(0.95 0.03 255);
    --sun: oklch(0.58 0.20 25);
    --sat: oklch(0.55 0.16 250);
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.04);
    --shadow-lg: 0 4px 24px rgba(0,0,0,.08), 0 24px 48px rgba(0,0,0,.10);
    --radius: 10px;
    --radius-sm: 6px;
    --font-ui: 'Geist', ui-sans-serif, sans-serif;
    --font-mono: 'Geist Mono', ui-monospace, monospace;
  }
  [data-theme="dark"]{
    --bg:#0e0e0d;
    --surface:#171716;
    --ink:#fafaf9;
    --ink-2:#d4d4d4;
    --ink-3:#a3a3a3;
    --ink-4:#737373;
    --line:#2a2a28;
    --line-2:#222220;
    --hover:#222220;
    --accent: oklch(0.72 0.16 255);
    --accent-fg:#0a0a0a;
    --accent-soft: oklch(0.30 0.06 255);
    --sun: oklch(0.72 0.18 25);
    --sat: oklch(0.72 0.14 250);
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 4px 12px rgba(0,0,0,.3);
    --shadow-lg: 0 4px 24px rgba(0,0,0,.5), 0 24px 48px rgba(0,0,0,.4);
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:var(--font-ui);font-feature-settings:"cv11","ss01";
    -webkit-font-smoothing:antialiased;
  }
  button{font:inherit;color:inherit}

  /* ===== App shell ===== */
  .app{
    min-height:100vh;display:flex;flex-direction:column;
  }
  .topbar{
    display:flex;align-items:center;gap:18px;
    padding:14px 22px;border-bottom:1px solid var(--line);
    background:var(--surface);position:sticky;top:0;z-index:20;
  }
  .brand{
    display:flex;align-items:center;gap:10px;font-weight:600;font-size:16px;letter-spacing:-.01em;
  }
  .brand .logo{
    width:26px;height:26px;border-radius:7px;background:var(--ink);color:var(--bg);
    display:grid;place-items:center;font-family:var(--font-mono);font-size:13px;font-weight:600;
  }
  .nav{display:flex;align-items:center;gap:6px;margin-left:8px}
  .iconbtn, .pill{
    height:32px;border:1px solid var(--line);background:var(--surface);
    border-radius:8px;cursor:pointer;color:var(--ink-2);
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    transition:background .12s, color .12s, border-color .12s;
  }
  .iconbtn{width:32px;padding:0}
  .pill{padding:0 12px;font-size:13.5px;font-weight:500}
  .iconbtn:hover, .pill:hover{background:var(--hover);color:var(--ink)}
  .pill.primary{background:var(--ink);color:var(--bg);border-color:var(--ink)}
  .pill.primary:hover{opacity:.92;background:var(--ink)}
  .pill.ghost{border-color:transparent;background:transparent}

  .title{
    font-size:20px;font-weight:600;letter-spacing:-.015em;margin:0 4px 0 8px;
    min-width:140px;
  }
  .title .yr{color:var(--ink-3);font-weight:400;margin-left:6px;font-feature-settings:"tnum"}

  .grow{flex:1}

  .view-toggle{
    display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;
    background:var(--surface);
  }
  .view-toggle button{
    border:none;background:transparent;height:32px;padding:0 12px;font-size:13px;font-weight:500;
    color:var(--ink-3);cursor:pointer;
  }
  .view-toggle button + button{border-left:1px solid var(--line)}
  .view-toggle button.on{background:var(--hover);color:var(--ink)}

  /* ===== Calendar surface ===== */
  main{flex:1;display:flex;min-height:0}
  .cal{
    flex:1;display:flex;flex-direction:column;min-width:0;background:var(--surface);
  }

  /* ===== Month view ===== */
  .dow-row{
    display:grid;grid-template-columns:repeat(7,1fr);
    border-bottom:1px solid var(--line);
  }
  .dow{
    padding:10px 12px;font-size:11.5px;font-weight:500;letter-spacing:.04em;
    color:var(--ink-3);text-transform:uppercase;
    font-family:var(--font-mono);
  }
  .dow.sun{color:var(--sun)}
  .dow.sat{color:var(--sat)}

  .month-grid{
    flex:1;display:grid;grid-template-columns:repeat(7,1fr);
    grid-auto-rows:1fr;min-height:0;
  }
  .mcell{
    border-right:1px solid var(--line);border-bottom:1px solid var(--line);
    padding:8px 10px 6px;position:relative;cursor:pointer;
    display:flex;flex-direction:column;gap:3px;min-height:0;overflow:hidden;
    transition:background .1s;
  }
  .mcell:hover{background:var(--hover)}
  .mcell.drag-over{background:var(--accent-soft);outline:1px dashed var(--accent);outline-offset:-3px;border-radius:2px}
  .mcell:nth-child(7n){border-right:none}
  .mcell.out{background:var(--line-2)}
  [data-theme="dark"] .mcell.out{background:#0e0e0d}
  .mcell.out .mday{color:var(--ink-4)}

  .mday{
    font-size:13px;font-weight:500;color:var(--ink-2);
    font-feature-settings:"tnum";
    display:inline-flex;align-items:center;gap:6px;
    height:22px;
  }
  .mcell.sun .mday{color:var(--sun)}
  .mcell.sat .mday{color:var(--sat)}
  .mcell.today .mday::before{
    content:"";display:inline-block;width:22px;height:22px;border-radius:50%;
    background:var(--accent);position:absolute;left:6px;top:6px;z-index:0;
  }
  .mcell.today .mday{color:var(--accent-fg);position:relative;z-index:1;
    width:22px;justify-content:center;padding:0;
  }
  .mcell.today.sun .mday, .mcell.today.sat .mday{color:var(--accent-fg)}
  .holiday-name{
    font-size:10.5px;color:var(--sun);font-weight:500;
    margin-left:auto;letter-spacing:-.005em;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%;
  }

  .events{display:flex;flex-direction:column;gap:2px;margin-top:2px;min-height:0;overflow:hidden}
  .ev{
    font-size:11.5px;line-height:1.25;font-weight:500;
    padding:2px 6px;border-radius:4px;cursor:grab;
    background:var(--accent-soft);color:var(--accent);
    border-left:2px solid var(--accent);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    user-select:none;
  }
  .ev:active{cursor:grabbing}
  .ev.dragging{opacity:.4}
  .ev.c-blue{background:oklch(0.95 0.03 255);color:oklch(0.45 0.18 255);border-left-color:oklch(0.55 0.18 255)}
  .ev.c-rose{background:oklch(0.95 0.03 25);color:oklch(0.50 0.18 25);border-left-color:oklch(0.58 0.18 25)}
  .ev.c-amber{background:oklch(0.95 0.04 80);color:oklch(0.50 0.15 70);border-left-color:oklch(0.65 0.15 75)}
  .ev.c-green{background:oklch(0.95 0.04 150);color:oklch(0.45 0.13 150);border-left-color:oklch(0.55 0.14 150)}
  .ev.c-violet{background:oklch(0.95 0.03 295);color:oklch(0.48 0.16 295);border-left-color:oklch(0.55 0.16 295)}
  .ev.c-slate{background:oklch(0.95 0.005 255);color:oklch(0.40 0.02 255);border-left-color:oklch(0.55 0.02 255)}
  [data-theme="dark"] .ev.c-blue{background:oklch(0.30 0.07 255);color:oklch(0.85 0.10 255)}
  [data-theme="dark"] .ev.c-rose{background:oklch(0.30 0.07 25);color:oklch(0.85 0.12 25)}
  [data-theme="dark"] .ev.c-amber{background:oklch(0.30 0.06 75);color:oklch(0.85 0.10 80)}
  [data-theme="dark"] .ev.c-green{background:oklch(0.30 0.05 150);color:oklch(0.85 0.10 150)}
  [data-theme="dark"] .ev.c-violet{background:oklch(0.30 0.06 295);color:oklch(0.85 0.10 295)}
  [data-theme="dark"] .ev.c-slate{background:oklch(0.25 0.005 255);color:oklch(0.85 0.01 255)}

  .ev .time{font-family:var(--font-mono);font-size:10.5px;opacity:.85;margin-right:4px;font-weight:400}
  .ev-more{
    font-size:11px;color:var(--ink-3);padding:2px 6px;cursor:pointer;
  }
  .ev-more:hover{color:var(--ink)}

  /* ===== Week / Day view ===== */
  .week{display:grid;grid-template-rows:auto 1fr;min-height:0;flex:1;overflow:hidden}
  .week-head{
    display:grid;border-bottom:1px solid var(--line);
  }
  .week .timecol-pad{border-right:1px solid var(--line)}
  .wh{
    padding:10px 12px;border-right:1px solid var(--line);text-align:left;
    cursor:pointer;
  }
  .wh:last-child{border-right:none}
  .wh .wh-dow{font-size:11px;font-weight:500;color:var(--ink-3);
    font-family:var(--font-mono);letter-spacing:.04em;text-transform:uppercase}
  .wh .wh-num{font-size:22px;font-weight:500;letter-spacing:-.02em;line-height:1.1;font-feature-settings:"tnum"}
  .wh.sun .wh-dow, .wh.sun .wh-num{color:var(--sun)}
  .wh.sat .wh-dow, .wh.sat .wh-num{color:var(--sat)}
  .wh.today .wh-num{
    display:inline-flex;width:34px;height:34px;border-radius:50%;background:var(--accent);
    color:var(--accent-fg);align-items:center;justify-content:center;font-size:17px;
  }

  .week-body{
    overflow:auto;display:grid;position:relative;
  }
  .timecol{
    border-right:1px solid var(--line);background:var(--surface);
  }
  .timeslot-label{
    height:48px;font-size:10.5px;color:var(--ink-3);font-family:var(--font-mono);
    padding:0 8px;text-align:right;transform:translateY(-7px);
  }
  .daycol{
    border-right:1px solid var(--line);position:relative;
  }
  .daycol:last-child{border-right:none}
  .daycol.today-col{background:linear-gradient(var(--accent-soft), var(--accent-soft));
    background-size:100% 100%;background-color:var(--accent-soft);
    opacity:1;
  }
  [data-theme="dark"] .daycol.today-col{background:rgba(255,255,255,.02)}
  .hourline{
    height:48px;border-bottom:1px solid var(--line-2);position:relative;
  }
  .hourline.half{border-bottom-style:dashed}

  .wevent{
    position:absolute;left:4px;right:4px;
    background:var(--accent-soft);color:var(--accent);
    border-left:3px solid var(--accent);
    border-radius:6px;padding:4px 6px;font-size:11.5px;line-height:1.25;
    cursor:grab;overflow:hidden;
    box-shadow:0 1px 2px rgba(0,0,0,.04);
  }
  .wevent .wt{font-family:var(--font-mono);font-size:10.5px;opacity:.85;display:block;margin-bottom:2px;font-weight:400}
  .wevent.dragging{opacity:.5}
  .now-line{position:absolute;left:0;right:0;height:0;border-top:1.5px solid var(--accent);z-index:3;pointer-events:none}
  .now-line::before{
    content:"";position:absolute;left:-5px;top:-5px;width:9px;height:9px;border-radius:50%;background:var(--accent);
  }

  /* ===== Sidebar (mini cal + tweaks) ===== */
  aside.side{
    width:300px;border-left:1px solid var(--line);background:var(--surface);
    display:flex;flex-direction:column;gap:0;flex-shrink:0;
  }
  .side-section{padding:18px 20px;border-bottom:1px solid var(--line)}
  .side-section h3{
    font-size:11.5px;font-weight:600;color:var(--ink-3);
    text-transform:uppercase;letter-spacing:.06em;margin:0 0 12px;
    font-family:var(--font-mono);
  }

  .mini{display:flex;flex-direction:column;gap:8px}
  .mini-head{display:flex;align-items:center;justify-content:space-between}
  .mini-head .mt{font-size:14px;font-weight:600;letter-spacing:-.01em}
  .mini-head .mn{display:flex;gap:2px}
  .mini-head .mn button{
    width:24px;height:24px;border:none;background:transparent;border-radius:5px;cursor:pointer;color:var(--ink-3);
  }
  .mini-head .mn button:hover{background:var(--hover);color:var(--ink)}
  .mini-grid{
    display:grid;grid-template-columns:repeat(7,1fr);gap:1px;font-size:11px;
  }
  .mini-grid .mdow{
    font-family:var(--font-mono);font-size:9.5px;color:var(--ink-4);
    text-align:center;padding:4px 0;
  }
  .mini-grid .mday{
    aspect-ratio:1;display:grid;place-items:center;border-radius:5px;cursor:pointer;
    color:var(--ink-2);font-feature-settings:"tnum";
  }
  .mini-grid .mday:hover{background:var(--hover)}
  .mini-grid .mday.out{color:var(--ink-4)}
  .mini-grid .mday.today{background:var(--accent);color:var(--accent-fg)}
  .mini-grid .mday.sun:not(.today){color:var(--sun)}
  .mini-grid .mday.sat:not(.today){color:var(--sat)}
  .mini-grid .mday.has-ev:not(.today)::after{
    content:"";display:block;width:3px;height:3px;border-radius:50%;background:var(--accent);
    position:absolute;margin-top:14px;
  }
  .mini-grid .mday{position:relative}

  /* tweaks */
  .twk-row{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:8px 0;font-size:13px;color:var(--ink-2);
  }
  .twk-row + .twk-row{border-top:1px solid var(--line-2)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;background:var(--bg)}
  .seg button{
    border:none;background:transparent;height:26px;padding:0 10px;font-size:12px;color:var(--ink-3);cursor:pointer;
  }
  .seg button + button{border-left:1px solid var(--line)}
  .seg button.on{background:var(--surface);color:var(--ink);font-weight:500}
  .swatch-row{display:flex;gap:6px}
  .swatch{
    width:20px;height:20px;border-radius:50%;border:1px solid var(--line);cursor:pointer;
    box-shadow:inset 0 0 0 0 transparent;
  }
  .swatch.on{box-shadow:inset 0 0 0 2px var(--surface), 0 0 0 2px var(--ink);}

  /* upcoming list */
  .up-list{display:flex;flex-direction:column;gap:0}
  .up-item{
    display:grid;grid-template-columns:42px 1fr;gap:10px;padding:10px 0;
    border-bottom:1px solid var(--line-2);cursor:pointer;
  }
  .up-item:last-child{border-bottom:none}
  .up-date{
    text-align:center;font-family:var(--font-mono);
  }
  .up-date .ud-d{font-size:18px;font-weight:600;color:var(--ink);line-height:1;font-feature-settings:"tnum"}
  .up-date .ud-m{font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
  .up-body .ub-t{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:2px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .up-body .ub-m{font-size:11.5px;color:var(--ink-3);font-family:var(--font-mono)}
  .up-empty{font-size:12.5px;color:var(--ink-4);text-align:center;padding:16px 0}

  /* ===== Modal ===== */
  .scrim{
    position:fixed;inset:0;background:rgba(10,10,10,.4);backdrop-filter:blur(4px);
    display:none;align-items:center;justify-content:center;z-index:50;
  }
  .scrim.show{display:flex}
  [data-theme="dark"] .scrim{background:rgba(0,0,0,.6)}
  .modal{
    width:420px;background:var(--surface);border:1px solid var(--line);
    border-radius:14px;box-shadow:var(--shadow-lg);overflow:hidden;
  }
  .modal-head{
    padding:16px 18px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;
  }
  .modal-head h3{margin:0;font-size:15px;font-weight:600;letter-spacing:-.01em}
  .modal-body{padding:16px 18px;display:flex;flex-direction:column;gap:12px}
  .modal-foot{
    padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;
    background:var(--bg);
  }
  label.f{display:flex;flex-direction:column;gap:5px;font-size:12px;color:var(--ink-3);font-weight:500}
  label.f input[type="text"], label.f input[type="time"], label.f input[type="date"], label.f textarea{
    border:1px solid var(--line);border-radius:8px;background:var(--bg);
    padding:9px 11px;font:inherit;font-size:13.5px;color:var(--ink);outline:none;
    transition:border-color .12s, box-shadow .12s;
  }
  label.f input:focus, label.f textarea:focus{
    border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);
  }
  label.f textarea{min-height:60px;resize:vertical;font-family:inherit}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .color-row{display:flex;gap:8px;flex-wrap:wrap}
  .color-pip{
    width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;
  }
  .color-pip.on{border-color:var(--ink)}
  .pill.danger{color:#dc2626;border-color:transparent}
  .pill.danger:hover{background:oklch(0.95 0.04 25);color:#b91c1c}
  [data-theme="dark"] .pill.danger:hover{background:oklch(0.30 0.07 25);color:oklch(0.85 0.12 25)}

  /* small icons */
  .icn{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}

  @media (max-width: 980px){
    aside.side{display:none}
  }
</style>
</head>
<body>
<div class="app" id="app">

  <!-- ===== Top bar ===== -->
  <header class="topbar">
    <div class="brand">
      <span class="logo">달</span>
      <span>Calendar</span>
    </div>

    <div class="nav">
      <button class="pill" id="todayBtn">오늘</button>
      <button class="iconbtn" id="prevBtn" aria-label="이전">
        <svg class="icn" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="iconbtn" id="nextBtn" aria-label="다음">
        <svg class="icn" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

    <h1 class="title" id="title">2026년 5월</h1>

    <span class="grow"></span>

    <div class="view-toggle" id="viewToggle">
      <button data-v="month" class="on">월</button>
      <button data-v="week">주</button>
      <button data-v="day">일</button>
    </div>

    <button class="pill primary" id="newBtn">
      <svg class="icn" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      새 일정
    </button>
  </header>

  <!-- ===== Main content ===== -->
  <main>
    <section class="cal" id="cal">
      <!-- view goes here -->
    </section>

    <aside class="side">
      <div class="side-section">
        <div class="mini" id="mini"></div>
      </div>
      <div class="side-section">
        <h3>다가오는 일정</h3>
        <div class="up-list" id="upcoming"></div>
      </div>
      <div class="side-section">
        <h3>설정 · Tweaks</h3>
        <div class="twk-row">
          <span>테마</span>
          <div class="seg" data-tw="theme">
            <button data-v="light" class="on">밝게</button>
            <button data-v="dark">어둡게</button>
          </div>
        </div>
        <div class="twk-row">
          <span>주 시작</span>
          <div class="seg" data-tw="weekstart">
            <button data-v="0" class="on">일</button>
            <button data-v="1">월</button>
          </div>
        </div>
        <div class="twk-row">
          <span>주말 강조</span>
          <div class="seg" data-tw="weekend">
            <button data-v="1" class="on">ON</button>
            <button data-v="0">OFF</button>
          </div>
        </div>
        <div class="twk-row">
          <span>공휴일</span>
          <div class="seg" data-tw="holiday">
            <button data-v="1" class="on">ON</button>
            <button data-v="0">OFF</button>
          </div>
        </div>
        <div class="twk-row">
          <span>강조색</span>
          <div class="swatch-row" id="accentRow">
            <span class="swatch on" data-h="255" style="background:oklch(0.55 0.18 255)"></span>
            <span class="swatch" data-h="150" style="background:oklch(0.55 0.14 150)"></span>
            <span class="swatch" data-h="295" style="background:oklch(0.55 0.16 295)"></span>
            <span class="swatch" data-h="25" style="background:oklch(0.58 0.18 25)"></span>
            <span class="swatch" data-h="75" style="background:oklch(0.65 0.15 75)"></span>
          </div>
        </div>
      </div>
    </aside>
  </main>
</div>

<!-- ===== Event modal ===== -->
<div class="scrim" id="scrim">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <h3 id="modalTitle">새 일정</h3>
      <button class="iconbtn" id="closeModal" aria-label="닫기">
        <svg class="icn" viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <label class="f">제목
        <input type="text" id="fTitle" placeholder="일정 제목" autocomplete="off" />
      </label>
      <div class="field-row">
        <label class="f">날짜
          <input type="date" id="fDate" />
        </label>
        <label class="f">시간
          <input type="time" id="fTime" />
        </label>
      </div>
      <label class="f">메모
        <textarea id="fNote" placeholder="(선택) 메모"></textarea>
      </label>
      <label class="f">색상
        <div class="color-row" id="colorRow"></div>
      </label>
    </div>
    <div class="modal-foot">
      <button class="pill danger" id="deleteBtn" style="margin-right:auto;display:none">삭제</button>
      <button class="pill ghost" id="cancelBtn">취소</button>
      <button class="pill primary" id="saveBtn">저장</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   STATE & STORAGE
============================================================ */
const STORE_KEY = 'kr_cal_v1';
const TWK_KEY   = 'kr_cal_tweaks_v1';

const DOW_KO = ['일','월','화','수','목','금','토'];
const DOW_KO_S = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
const MO_EN_S = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

const HOLIDAYS = {
  // YYYY-MM-DD : name (subset, illustrative)
  '2026-01-01': '신정',
  '2026-02-16': '설날 연휴',
  '2026-02-17': '설날',
  '2026-02-18': '설날 연휴',
  '2026-03-01': '삼일절',
  '2026-05-05': '어린이날',
  '2026-05-25': '부처님오신날',
  '2026-06-06': '현충일',
  '2026-08-15': '광복절',
  '2026-09-24': '추석 연휴',
  '2026-09-25': '추석',
  '2026-09-26': '추석 연휴',
  '2026-10-03': '개천절',
  '2026-10-09': '한글날',
  '2026-12-25': '성탄절',
};

const COLORS = [
  {k:'blue',  c:'oklch(0.55 0.18 255)'},
  {k:'rose',  c:'oklch(0.58 0.18 25)'},
  {k:'amber', c:'oklch(0.65 0.15 75)'},
  {k:'green', c:'oklch(0.55 0.14 150)'},
  {k:'violet',c:'oklch(0.55 0.16 295)'},
  {k:'slate', c:'oklch(0.55 0.02 255)'},
];

function uid(){ return Math.random().toString(36).slice(2,10); }
function pad(n){ return String(n).padStart(2,'0'); }
function ymd(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function parseYmd(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }

function loadEvents(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  // seed: sparse, realistic events anchored on this month
  const t = new Date();
  const y = t.getFullYear(), m = t.getMonth();
  const at = (d, hh, mm) => {
    const x = new Date(y,m,d,hh,mm);
    return ymd(x);
  };
  return [
    { id: uid(), title:'팀 위클리', date: at(2,10,0), time:'10:00', dur:60, color:'blue',  note:'스프린트 리뷰' },
    { id: uid(), title:'치과',     date: at(8,15,30), time:'15:30', dur:45, color:'rose',  note:'정기 검진' },
    { id: uid(), title:'러닝 5km', date: at(11,7,0),  time:'07:00', dur:60, color:'green', note:'한강' },
    { id: uid(), title:'디자인 리뷰', date: at(14,14,0), time:'14:00', dur:90, color:'blue', note:'캘린더 v1' },
    { id: uid(), title:'저녁 약속', date: at(22,19,0),  time:'19:00', dur:120, color:'amber', note:'' },
    { id: uid(), title:'월말 회고', date: at(28,16,0),  time:'16:00', dur:60, color:'violet', note:'' },
  ];
}

function saveEvents(){ localStorage.setItem(STORE_KEY, JSON.stringify(events)); }

function loadTweaks(){
  try{
    const raw = localStorage.getItem(TWK_KEY);
    if(raw) return Object.assign(defaultTweaks(), JSON.parse(raw));
  }catch(e){}
  return defaultTweaks();
}
function defaultTweaks(){
  return { theme:'light', weekstart:0, weekend:1, holiday:1, accentHue:255 };
}
function saveTweaks(){ localStorage.setItem(TWK_KEY, JSON.stringify(tweaks)); }

let events = loadEvents();
let tweaks = loadTweaks();
let view = 'month';
let cursor = new Date(); // current month/week/day anchor
let editingId = null;    // id of event being edited in modal (null = new)
let dateForNew = null;   // pre-filled date when adding from a cell

/* ============================================================
   THEME / TWEAKS APPLICATION
============================================================ */
function applyTweaks(){
  document.documentElement.dataset.theme = tweaks.theme;
  document.documentElement.style.setProperty('--accent', `oklch(0.55 0.18 ${tweaks.accentHue})`);
  document.documentElement.style.setProperty('--accent-soft', `oklch(0.95 0.03 ${tweaks.accentHue})`);
  if(tweaks.theme === 'dark'){
    document.documentElement.style.setProperty('--accent', `oklch(0.72 0.16 ${tweaks.accentHue})`);
    document.documentElement.style.setProperty('--accent-soft', `oklch(0.30 0.06 ${tweaks.accentHue})`);
  }
  // segment buttons
  document.querySelectorAll('.seg').forEach(seg=>{
    const tw = seg.dataset.tw;
    [...seg.children].forEach(b=>{
      b.classList.toggle('on', String(tweaks[tw]) === b.dataset.v);
    });
  });
  document.querySelectorAll('#accentRow .swatch').forEach(s=>{
    s.classList.toggle('on', Number(s.dataset.h) === tweaks.accentHue);
  });
}

document.querySelectorAll('.seg').forEach(seg=>{
  const tw = seg.dataset.tw;
  seg.addEventListener('click', e=>{
    const b = e.target.closest('button'); if(!b) return;
    let v = b.dataset.v;
    if(tw !== 'theme') v = Number(v);
    tweaks[tw] = v;
    saveTweaks();
    applyTweaks();
    render();
  });
});
document.getElementById('accentRow').addEventListener('click', e=>{
  const s = e.target.closest('.swatch'); if(!s) return;
  tweaks.accentHue = Number(s.dataset.h);
  saveTweaks();
  applyTweaks();
});

/* ============================================================
   NAVIGATION
============================================================ */
document.getElementById('prevBtn').onclick = ()=>{
  if(view==='month') cursor = new Date(cursor.getFullYear(), cursor.getMonth()-1, 1);
  else if(view==='week') cursor = new Date(cursor.getFullYear(), cursor.getMonth(), cursor.getDate()-7);
  else cursor = new Date(cursor.getFullYear(), cursor.getMonth(), cursor.getDate()-1);
  render();
};
document.getElementById('nextBtn').onclick = ()=>{
  if(view==='month') cursor = new Date(cursor.getFullYear(), cursor.getMonth()+1, 1);
  else if(view==='week') cursor = new Date(cursor.getFullYear(), cursor.getMonth(), cursor.getDate()+7);
  else cursor = new Date(cursor.getFullYear(), cursor.getMonth(), cursor.getDate()+1);
  render();
};
document.getElementById('todayBtn').onclick = ()=>{ cursor = new Date(); render(); };

document.getElementById('viewToggle').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  view = b.dataset.v;
  [...e.currentTarget.children].forEach(x=>x.classList.toggle('on', x===b));
  render();
});

document.addEventListener('keydown', e=>{
  if(document.getElementById('scrim').classList.contains('show')) return;
  if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if(e.key === 'ArrowLeft') document.getElementById('prevBtn').click();
  else if(e.key === 'ArrowRight') document.getElementById('nextBtn').click();
  else if(e.key === 't' || e.key === 'T') document.getElementById('todayBtn').click();
  else if(e.key === 'm' || e.key==='M'){ view='month'; render(); }
  else if(e.key === 'w' || e.key==='W'){ view='week'; render(); }
  else if(e.key === 'd' || e.key==='D'){ view='day'; render(); }
  else if(e.key === 'n' || e.key==='N') openModal(null, ymd(new Date()));
});

/* ============================================================
   RENDER
============================================================ */
function render(){
  renderTitle();
  renderViewToggleSync();
  if(view==='month') renderMonth();
  else if(view==='week') renderWeek(7);
  else renderWeek(1);
  renderMini();
  renderUpcoming();
}
function renderViewToggleSync(){
  document.querySelectorAll('#viewToggle button').forEach(b=>{
    b.classList.toggle('on', b.dataset.v === view);
  });
}
function renderTitle(){
  const t = document.getElementById('title');
  if(view==='month'){
    t.innerHTML = `${cursor.getFullYear()}년 ${cursor.getMonth()+1}월`;
  } else if(view==='week'){
    const start = startOfWeek(cursor);
    const end = new Date(start); end.setDate(end.getDate()+6);
    if(start.getMonth()===end.getMonth()){
      t.innerHTML = `${start.getFullYear()}년 ${start.getMonth()+1}월 ${start.getDate()}–${end.getDate()}일`;
    } else {
      t.innerHTML = `${start.getMonth()+1}월 ${start.getDate()}일 – ${end.getMonth()+1}월 ${end.getDate()}일`;
    }
  } else {
    t.innerHTML = `${cursor.getFullYear()}년 ${cursor.getMonth()+1}월 ${cursor.getDate()}일 <span class="yr">${DOW_KO_S[cursor.getDay()]}</span>`;
  }
}

function startOfWeek(d){
  const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const off = (x.getDay() - tweaks.weekstart + 7) % 7;
  x.setDate(x.getDate() - off);
  return x;
}

function eventsOn(date){
  const k = ymd(date);
  return events.filter(e => e.date === k).sort((a,b)=> (a.time||'').localeCompare(b.time||''));
}

/* ===== Month view ===== */
function renderMonth(){
  const cal = document.getElementById('cal');
  const ws = tweaks.weekstart;
  const dows = [...Array(7)].map((_,i)=> (ws+i)%7);

  const first = new Date(cursor.getFullYear(), cursor.getMonth(), 1);
  const start = startOfWeek(first);
  // use 6 weeks always for stable layout
  const today = new Date(); today.setHours(0,0,0,0);

  let html = `<div class="dow-row">`;
  dows.forEach(i=>{
    html += `<div class="dow ${i===0?'sun':i===6?'sat':''}">${DOW_KO[i]}</div>`;
  });
  html += `</div><div class="month-grid">`;

  for(let i=0;i<42;i++){
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    const out = d.getMonth() !== cursor.getMonth();
    const dow = d.getDay();
    const isToday = d.getTime() === today.getTime();
    const k = ymd(d);
    const holiday = tweaks.holiday ? HOLIDAYS[k] : null;
    const dayEv = eventsOn(d);
    const max = 3;

    html += `<div class="mcell ${out?'out':''} ${dow===0&&tweaks.weekend?'sun':''} ${dow===6&&tweaks.weekend?'sat':''} ${isToday?'today':''}" data-date="${k}">`;
    html += `<div class="mday">${d.getDate()}${holiday?`<span class="holiday-name">${holiday}</span>`:''}</div>`;
    if(!out || dayEv.length){
      html += `<div class="events">`;
      dayEv.slice(0,max).forEach(ev=>{
        html += `<div class="ev c-${ev.color}" draggable="true" data-id="${ev.id}">${ev.time?`<span class="time">${ev.time}</span>`:''}${esc(ev.title)}</div>`;
      });
      if(dayEv.length>max){
        html += `<div class="ev-more" data-date="${k}">+${dayEv.length-max}개 더</div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }
  html += `</div>`;
  cal.innerHTML = html;

  // bindings
  cal.querySelectorAll('.mcell').forEach(cell=>{
    cell.addEventListener('click', e=>{
      if(e.target.closest('.ev')) return;
      if(e.target.closest('.ev-more')){
        // jump to day view
        cursor = parseYmd(e.target.dataset.date); view='day'; render(); return;
      }
      openModal(null, cell.dataset.date);
    });
    bindCellDrop(cell);
  });
  cal.querySelectorAll('.ev').forEach(el=>{
    el.addEventListener('click', e=>{
      e.stopPropagation();
      openModal(el.dataset.id);
    });
    el.addEventListener('dragstart', e=>{
      e.dataTransfer.setData('text/plain', el.dataset.id);
      e.dataTransfer.effectAllowed = 'move';
      el.classList.add('dragging');
    });
    el.addEventListener('dragend', ()=> el.classList.remove('dragging'));
  });
}

function bindCellDrop(cell){
  cell.addEventListener('dragover', e=>{ e.preventDefault(); cell.classList.add('drag-over')});
  cell.addEventListener('dragleave', ()=> cell.classList.remove('drag-over'));
  cell.addEventListener('drop', e=>{
    e.preventDefault();
    cell.classList.remove('drag-over');
    const id = e.dataTransfer.getData('text/plain');
    const ev = events.find(x=>x.id===id);
    if(!ev) return;
    ev.date = cell.dataset.date;
    saveEvents(); render();
  });
}

/* ===== Week / Day view ===== */
function renderWeek(days){
  const cal = document.getElementById('cal');
  const start = days===7 ? startOfWeek(cursor) : new Date(cursor.getFullYear(),cursor.getMonth(),cursor.getDate());
  const today = new Date(); today.setHours(0,0,0,0);

  const cols = days===7 ? '60px repeat(7,1fr)' : '60px 1fr';

  let head = `<div class="week-head" style="grid-template-columns:${cols}"><div class="timecol-pad"></div>`;
  for(let i=0;i<days;i++){
    const d = new Date(start); d.setDate(start.getDate()+i);
    const dow = d.getDay();
    const isToday = d.getTime() === today.getTime();
    head += `<div class="wh ${dow===0&&tweaks.weekend?'sun':''} ${dow===6&&tweaks.weekend?'sat':''} ${isToday?'today':''}" data-date="${ymd(d)}">
      <div class="wh-dow">${DOW_KO[dow]}</div>
      <div class="wh-num">${d.getDate()}</div>
    </div>`;
  }
  head += `</div>`;

  // body: time column + day columns
  let body = `<div class="week-body" style="grid-template-columns:${cols}">`;
  body += `<div class="timecol">`;
  for(let h=0;h<24;h++){
    body += `<div class="timeslot-label">${pad(h)}:00</div>`;
  }
  body += `</div>`;

  for(let i=0;i<days;i++){
    const d = new Date(start); d.setDate(start.getDate()+i);
    const isToday = d.getTime() === today.getTime();
    body += `<div class="daycol ${isToday?'today-col':''}" data-date="${ymd(d)}">`;
    for(let h=0;h<24;h++){
      body += `<div class="hourline" data-hour="${h}"></div>`;
    }
    // events on this day
    const dayEv = eventsOn(d);
    dayEv.forEach(ev=>{
      const [hh,mm] = (ev.time||'09:00').split(':').map(Number);
      const top = (hh*60 + mm) * (48/60);
      const height = Math.max(22, (ev.dur||60) * (48/60) - 4);
      body += `<div class="wevent c-${ev.color}" draggable="true" data-id="${ev.id}" style="top:${top}px;height:${height}px;background:var(--accent-soft)">
        <span class="wt">${ev.time||''}${ev.dur?` · ${formatDur(ev.dur)}`:''}</span>${esc(ev.title)}
      </div>`;
    });
    // now-line if today
    if(isToday){
      const now = new Date();
      const top = (now.getHours()*60 + now.getMinutes()) * (48/60);
      body += `<div class="now-line" style="top:${top}px"></div>`;
    }
    body += `</div>`;
  }
  body += `</div>`;
  cal.innerHTML = head + body;

  // bindings
  cal.querySelectorAll('.wh').forEach(wh=>{
    wh.addEventListener('click', ()=>{
      cursor = parseYmd(wh.dataset.date); view='day'; render();
    });
  });
  cal.querySelectorAll('.daycol').forEach(col=>{
    col.addEventListener('click', e=>{
      if(e.target.closest('.wevent')) return;
      // figure hour from click y
      const rect = col.getBoundingClientRect();
      const y = e.clientY - rect.top;
      const hour = Math.max(0, Math.min(23, Math.floor(y / 48)));
      const time = `${pad(hour)}:00`;
      openModal(null, col.dataset.date, time);
    });
    col.addEventListener('dragover', e=>{ e.preventDefault(); col.style.background = 'var(--accent-soft)'; });
    col.addEventListener('dragleave', ()=> col.style.background = '');
    col.addEventListener('drop', e=>{
      e.preventDefault(); col.style.background='';
      const id = e.dataTransfer.getData('text/plain');
      const ev = events.find(x=>x.id===id);
      if(!ev) return;
      const rect = col.getBoundingClientRect();
      const y = e.clientY - rect.top;
      const hour = Math.max(0, Math.min(23, Math.floor(y / 48)));
      ev.date = col.dataset.date;
      ev.time = `${pad(hour)}:00`;
      saveEvents(); render();
    });
  });
  cal.querySelectorAll('.wevent').forEach(el=>{
    el.addEventListener('click', e=>{ e.stopPropagation(); openModal(el.dataset.id); });
    el.addEventListener('dragstart', e=>{
      e.dataTransfer.setData('text/plain', el.dataset.id);
      el.classList.add('dragging');
    });
    el.addEventListener('dragend', ()=> el.classList.remove('dragging'));
  });

  // scroll to ~7AM by default
  requestAnimationFrame(()=>{
    const wb = cal.querySelector('.week-body');
    if(wb) wb.scrollTop = 7*48 - 20;
  });
}

function formatDur(min){
  if(min < 60) return `${min}분`;
  const h = Math.floor(min/60), m = min%60;
  return m ? `${h}시간 ${m}분` : `${h}시간`;
}

/* ===== Mini calendar (sidebar) ===== */
function renderMini(){
  const root = document.getElementById('mini');
  const ws = tweaks.weekstart;
  const dows = [...Array(7)].map((_,i)=> (ws+i)%7);
  const first = new Date(cursor.getFullYear(), cursor.getMonth(), 1);
  const start = startOfWeek(first);
  const today = new Date(); today.setHours(0,0,0,0);

  let html = `<div class="mini-head">
    <div class="mt">${cursor.getFullYear()}.${pad(cursor.getMonth()+1)}</div>
    <div class="mn">
      <button id="miniPrev" aria-label="이전"><svg class="icn" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
      <button id="miniNext" aria-label="다음"><svg class="icn" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
    </div>
  </div>`;

  html += `<div class="mini-grid">`;
  dows.forEach(i=> html += `<div class="mdow">${DOW_KO[i]}</div>`);
  for(let i=0;i<42;i++){
    const d = new Date(start); d.setDate(start.getDate()+i);
    const out = d.getMonth() !== cursor.getMonth();
    const dow = d.getDay();
    const isToday = d.getTime() === today.getTime();
    const k = ymd(d);
    const has = events.some(e=>e.date===k);
    html += `<div class="mday ${out?'out':''} ${dow===0?'sun':''} ${dow===6?'sat':''} ${isToday?'today':''} ${has?'has-ev':''}" data-date="${k}">${d.getDate()}</div>`;
  }
  html += `</div>`;
  root.innerHTML = html;

  document.getElementById('miniPrev').onclick = ()=>{ cursor = new Date(cursor.getFullYear(), cursor.getMonth()-1, 1); render(); };
  document.getElementById('miniNext').onclick = ()=>{ cursor = new Date(cursor.getFullYear(), cursor.getMonth()+1, 1); render(); };
  root.querySelectorAll('.mday').forEach(el=>{
    el.addEventListener('click', ()=>{ cursor = parseYmd(el.dataset.date); if(view==='month') render(); else { view='day'; render(); }});
  });
}

function renderUpcoming(){
  const root = document.getElementById('upcoming');
  const today = new Date(); today.setHours(0,0,0,0);
  const list = events
    .filter(e => parseYmd(e.date) >= today)
    .sort((a,b)=> a.date.localeCompare(b.date) || (a.time||'').localeCompare(b.time||''))
    .slice(0,5);
  if(!list.length){
    root.innerHTML = `<div class="up-empty">예정된 일정이 없습니다</div>`;
    return;
  }
  root.innerHTML = list.map(e=>{
    const d = parseYmd(e.date);
    return `<div class="up-item" data-id="${e.id}">
      <div class="up-date"><div class="ud-d">${d.getDate()}</div><div class="ud-m">${MO_EN_S[d.getMonth()]}</div></div>
      <div class="up-body">
        <div class="ub-t">${esc(e.title)}</div>
        <div class="ub-m">${e.time||''}${e.time?' · ':''}${DOW_KO[d.getDay()]}</div>
      </div>
    </div>`;
  }).join('');
  root.querySelectorAll('.up-item').forEach(el=>{
    el.addEventListener('click', ()=> openModal(el.dataset.id));
  });
}

/* ============================================================
   MODAL (add / edit / delete)
============================================================ */
const scrim = document.getElementById('scrim');
const fTitle = document.getElementById('fTitle');
const fDate  = document.getElementById('fDate');
const fTime  = document.getElementById('fTime');
const fNote  = document.getElementById('fNote');
const colorRow = document.getElementById('colorRow');
let pickedColor = 'blue';

function buildColorPips(){
  colorRow.innerHTML = COLORS.map(c=>
    `<span class="color-pip" data-k="${c.k}" style="background:${c.c}"></span>`
  ).join('');
  colorRow.querySelectorAll('.color-pip').forEach(p=>{
    p.addEventListener('click', ()=>{
      pickedColor = p.dataset.k;
      colorRow.querySelectorAll('.color-pip').forEach(x=>x.classList.toggle('on', x===p));
    });
  });
}
buildColorPips();

function openModal(id, dateStr, timeStr){
  editingId = id;
  document.getElementById('modalTitle').textContent = id ? '일정 편집' : '새 일정';
  document.getElementById('deleteBtn').style.display = id ? '' : 'none';
  if(id){
    const ev = events.find(e=>e.id===id);
    if(!ev) return;
    fTitle.value = ev.title;
    fDate.value = ev.date;
    fTime.value = ev.time || '';
    fNote.value = ev.note || '';
    pickedColor = ev.color || 'blue';
  } else {
    fTitle.value = '';
    fDate.value = dateStr || ymd(cursor);
    fTime.value = timeStr || '';
    fNote.value = '';
    pickedColor = 'blue';
  }
  colorRow.querySelectorAll('.color-pip').forEach(p=>p.classList.toggle('on', p.dataset.k===pickedColor));
  scrim.classList.add('show');
  setTimeout(()=>fTitle.focus(),50);
}
function closeModal(){ scrim.classList.remove('show'); editingId=null; }

document.getElementById('closeModal').onclick = closeModal;
document.getElementById('cancelBtn').onclick = closeModal;
scrim.addEventListener('click', e=>{ if(e.target===scrim) closeModal(); });
document.addEventListener('keydown', e=>{
  if(!scrim.classList.contains('show')) return;
  if(e.key==='Escape') closeModal();
  else if(e.key==='Enter' && (e.metaKey||e.ctrlKey)) document.getElementById('saveBtn').click();
});

document.getElementById('saveBtn').onclick = ()=>{
  const title = fTitle.value.trim();
  if(!title){ fTitle.focus(); return; }
  const payload = {
    title,
    date: fDate.value || ymd(new Date()),
    time: fTime.value || '',
    dur: 60,
    color: pickedColor,
    note: fNote.value.trim(),
  };
  if(editingId){
    const ev = events.find(e=>e.id===editingId);
    Object.assign(ev, payload);
  } else {
    events.push({ id: uid(), ...payload });
  }
  saveEvents();
  closeModal();
  render();
};
document.getElementById('deleteBtn').onclick = ()=>{
  if(!editingId) return;
  events = events.filter(e=>e.id!==editingId);
  saveEvents();
  closeModal();
  render();
};
document.getElementById('newBtn').onclick = ()=> openModal(null, ymd(cursor));

/* ============================================================
   UTIL
============================================================ */
function esc(s){
  return String(s).replace(/[&<>"']/g, c=>({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

/* ============================================================
   INIT
============================================================ */
applyTweaks();
render();
// re-render now-line every minute
setInterval(()=>{ if(view!=='month') render(); }, 60*1000);
</script>
